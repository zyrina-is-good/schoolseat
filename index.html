<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seat Booking</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; }
        .note { opacity: 0.7; font-size: 14px; margin-bottom: 30px; }

        .classroom {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            border: 2px dashed #334155;
            border-radius: 10px;
        }

        .front-wall {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .whiteboard {
            border: 2px solid white;
            padding: 10px 120px;
            font-weight: bold;
            font-size: 18px;
            background: #1e293b;
            letter-spacing: 2px;
        }

        .teacher-desk {
            background: #3b82f6;
            padding: 10px 30px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .door-container {
            position: absolute;
            right: 0;
            top: 100px;
        }

        .door {
            writing-mode: vertical-rl;
            border: 2px solid white;
            padding: 40px 10px;
            background: #d97706;
            font-weight: bold;
            letter-spacing: 2px;
            border-right: none;
            border-radius: 5px 0 0 5px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            padding-right: 40px; /* space for the door */
        }

        .desk-row {
            display: flex;
            gap: 40px;
        }

        .desk {
            display: flex;
            border: 2px solid white;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .seat {
            width: 75px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: 0.2s;
        }

        .seat:hover {
            filter: brightness(1.15);
        }

        .seat:first-child {
            border-right: 1px solid white;
        }

        .seat-name {
            padding: 10px 4px;
            border-bottom: 1px solid white;
            font-size: 13px;
            font-weight: bold;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: white;
        }

        .seat-absen {
            padding: 8px;
            font-size: 14px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .empty {
            background: #22c55e;
        }

        .filled {
            background: #ef4444;
        }
    </style>
</head>

<body>

    <h1>Pilih Kursi</h1>
    <div class="note">Klik kursi untuk isi / lihat detail</div>
    
    <div class="classroom">
        <div class="front-wall">
            <div class="whiteboard">PAPAN TULIS</div>
            <div class="teacher-desk">Meja Guru</div>
        </div>
        <div class="door-container">
            <div class="door">PINTU</div>
        </div>
        <div class="container" id="seats"></div>
    </div>

    <script>
        const supabaseUrl = "https://basaafhivrfpkytcacsi.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc2FhZmhpdnJmcGt5dGNhY3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDQ0ODksImV4cCI6MjA5NTE4MDQ4OX0.-vvIoSse9Ztp_ljGb6BwVNxon1geLBCkHvBet5gq1tU";

        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const seatsDiv = document.getElementById("seats");
        const rows = ["A", "B", "C", "D"];
        const cols = 8;

        async function loadSeats() {
            seatsDiv.innerHTML = "";

            const { data, error } = await supabaseClient
                .from("Seats")
                .select("*");

            if (error) {
                alert("Error load data");
                console.error(error);
                return;
            }

            rows.forEach(row => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "desk-row";

                for (let deskIdx = 0; deskIdx < 4; deskIdx++) {
                    const deskDiv = document.createElement("div");
                    deskDiv.className = "desk";

                    for (let seatIdx = 1; seatIdx <= 2; seatIdx++) {
                        const col = deskIdx * 2 + seatIdx;
                        const seatId = row + col;
                        const seatData = data.find(x => x.seat_id === seatId);

                        const seatDiv = document.createElement("div");
                        seatDiv.className = "seat " + (seatData ? "filled" : "empty");

                        const nameDiv = document.createElement("div");
                        nameDiv.className = "seat-name";
                        nameDiv.innerText = seatData ? seatData.name : seatId;

                        const absenDiv = document.createElement("div");
                        absenDiv.className = "seat-absen";
                        absenDiv.innerText = seatData ? seatData.absen : "-";

                        seatDiv.appendChild(nameDiv);
                        seatDiv.appendChild(absenDiv);

                        seatDiv.onclick = async () => {
                            if (seatData) {
                                alert(
                                    "Kursi: " + seatId +
                                    "\nNama: " + seatData.name +
                                    "\nAbsen: " + seatData.absen
                                );
                                return;
                            }

                            const name = prompt("Nama?");
                            if (!name) return;
                            const absen = prompt("Nomor Absen?");
                            if (!absen) return;

                            const { error: insertError } = await supabaseClient
                                .from("Seats")
                                .insert({
                                    seat_id: seatId,
                                    name: name,
                                    absen: absen
                                });

                            if (insertError) {
                                alert("Gagal simpan");
                                console.error(insertError);
                            }

                            loadSeats();
                        };
                        deskDiv.appendChild(seatDiv);
                    }
                    rowDiv.appendChild(deskDiv);
                }
                seatsDiv.appendChild(rowDiv);
            });
        }

        loadSeats();
    </script>
</body>

</html>
