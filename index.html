<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seat Booking</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #09090b 0%, #1e1b4b 100%);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            padding-left: 260px;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .note {
            opacity: 0.7;
            font-size: 15px;
            margin-bottom: 40px;
        }

        .classroom {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .front-wall {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 60px;
        }

        .whiteboard {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 140px;
            font-weight: 700;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            letter-spacing: 3px;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .teacher-desk {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .door-container {
            position: absolute;
            right: 0;
            top: 120px;
        }

        .door {
            writing-mode: vertical-rl;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 12px;
            background: linear-gradient(to bottom, #d97706, #b45309);
            font-weight: 700;
            letter-spacing: 3px;
            border-right: none;
            border-radius: 8px 0 0 8px;
            box-shadow: -4px 0 15px rgba(217, 119, 6, 0.2);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            padding-right: 40px;
        }

        .desk-row {
            display: flex;
            gap: 40px;
        }

        .desk {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .desk:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .seat {
            width: 80px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .seat:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .seat:hover {
            transform: translateY(-4px);
            z-index: 10;
        }

        .seat::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .seat:hover::after {
            opacity: 1;
        }

        .seat-name {
            padding: 12px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
            font-weight: 600;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: #f8fafc;
        }

        .seat-absen {
            padding: 10px;
            font-size: 15px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-weight: 700;
        }

        .empty {
            background: rgba(34, 197, 94, 0.1);
        }

        .empty .seat-name,
        .empty .seat-absen {
            color: rgba(34, 197, 94, 0.8);
        }

        .empty:hover {
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
            background: rgba(34, 197, 94, 0.2);
        }

        .filled {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.4));
        }

        .filled:hover {
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            overflow-y: auto;
            text-align: left;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .admin-panel h3 {
            margin-top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, #f43f5e, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 13px;
            transition: 0.2s;
        }

        .admin-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.5);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            color: white;
            text-align: left;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .modal-content input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
        }

        .detail-info p {
            margin: 10px 0;
            font-size: 15px;
            color: #e2e8f0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* Mobile Toggle & Responsive */
        .admin-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 101;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-toggle:hover {
            transform: scale(1.1);
        }

        .classroom-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding-left: 0;
                padding-top: 60px;
            }

            h1 {
                font-size: 2rem;
            }

            .classroom {
                width: max-content;
                min-width: 800px;
                margin: 0 auto;
                padding: 20px;
            }

            .admin-panel {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                bottom: 0;
                padding-top: 60px;
                box-shadow: none;
            }

            .admin-panel.open {
                transform: translateX(0);
                box-shadow: 5px 0 30px rgba(0, 0, 0, 0.8);
            }

            .admin-toggle {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <!-- Booking Modal -->
        <div id="modal-booking" class="modal-content" style="display: none;">
            <h3>Daftar Kursi <span id="booking-seat-id"></span></h3>
            <select id="booking-name"
                style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; font-family: 'Outfit', sans-serif; outline: none;">
                <option value="" disabled selected>Pilih Nama</option>
            </select>
            <input type="number" id="booking-absen" placeholder="Nomor Absen otomatis" readonly style="background: rgba(255,255,255,0.02); color: #94a3b8; cursor: not-allowed; border-color: rgba(255,255,255,0.05);">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-primary" onclick="submitBooking()">Simpan</button>
            </div>
        </div>

        <!-- Detail Modal -->
        <div id="modal-detail" class="modal-content" style="display: none;">
            <h3>Detail Kursi <span id="detail-seat-id"></span></h3>
            <div class="detail-info">
                <p><strong>Nama:</strong> <span id="detail-name"></span></p>
                <p><strong>Absen:</strong> <span id="detail-absen"></span></p>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="closeModal()">Tutup</button>
            </div>
        </div>

        <!-- Confirm Modal -->
        <div id="modal-confirm" class="modal-content" style="display: none;">
            <h3>Konfirmasi Hapus</h3>
            <p>Hapus data kursi <span id="confirm-seat-id" style="font-weight:bold;"></span> atas nama <span
                    id="confirm-name" style="font-weight:bold; color:#ef4444;"></span>?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-danger" onclick="submitDelete()">Hapus</button>
            </div>
        </div>

        <!-- Login Modal -->
        <div id="modal-login" class="modal-content" style="display: none;">
            <h3>Login Admin</h3>
            <input type="password" id="login-password" placeholder="Masukkan Password Admin">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-primary" onclick="submitLogin()">Masuk</button>
            </div>
        </div>
    </div>

    <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

    <div class="admin-panel">
        <h3>Admin Panel</h3>
        <div id="admin-login-area">
            <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="openLoginModal()">Login
                Admin</button>
        </div>
        <div id="admin-content-area" style="display: none;">
            <p style="font-size: 12px; opacity: 0.8; margin-top:0;">Daftar kursi terisi:</p>
            <div id="admin-list"></div>
            <button class="btn-cancel" style="width:100%; margin-top:20px;" onclick="logoutAdmin()">Logout</button>
        </div>
    </div>

    <h1>Pilih Kursi</h1>
    <div class="note">Klik kursi untuk isi / lihat detail</div>

    <div class="classroom-wrapper">
        <div class="classroom">
            <div class="front-wall">
                <div class="whiteboard">PAPAN TULIS</div>
            </div>
            <div class="door-container">
                <div class="door">PINTU</div>
            </div>
            <div class="container" id="seats"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://basaafhivrfpkytcacsi.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc2FhZmhpdnJmcGt5dGNhY3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDQ0ODksImV4cCI6MjA5NTE4MDQ4OX0.-vvIoSse9Ztp_ljGb6BwVNxon1geLBCkHvBet5gq1tU";

        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const seatsDiv = document.getElementById("seats");
        const adminList = document.getElementById("admin-list");
        const rows = ["A", "B", "C", "D"];
        const cols = 8;

        const studentData = [
            { name: "Hanif", absen: 1 }, { name: "Aisha", absen: 2 }, { name: "Anel", absen: 3 },
            { name: "Arsyad", absen: 4 }, { name: "Avika", absen: 5 }, { name: "Azruul", absen: 6 },
            { name: "Banyu", absen: 7 }, { name: "Nayya", absen: 8 }, { name: "Chelsea", absen: 9 },
            { name: "Gio", absen: 10 }, { name: "Citra", absen: 11 }, { name: "Dimas R", absen: 12 },
            { name: "Zara", absen: 13 }, { name: "Sella", absen: 14 }, { name: "Ifah", absen: 15 },
            { name: "Dimas J", absen: 16 }, { name: "Kael", absen: 17 }, { name: "Kayfa", absen: 18 },
            { name: "Keysha", absen: 19 }, { name: "Khansa", absen: 20 }, { name: "Laela", absen: 21 },
            { name: "Lintang", absen: 22 }, { name: "Azzam", absen: 23 }, { name: "Raihan", absen: 24 },
            { name: "Esa", absen: 25 }, { name: "Naila", absen: 26 }, { name: "Tamaro", absen: 27 },
            { name: "Nayla", absen: 28 }, { name: "Pita", absen: 29 }, { name: "RizQ", absen: 30 },
            { name: "Nadya", absen: 31 }, { name: "Viola", absen: 32 }
        ];
        let globalFilledSeats = [];

        let isAdminLoggedIn = false;
        let currentSeat = null;

        function toggleAdmin() {
            document.querySelector('.admin-panel').classList.toggle('open');
        }

        function openModal(id) {
            document.getElementById("modal-overlay").style.display = "flex";
            document.querySelectorAll(".modal-content").forEach(el => el.style.display = "none");
            document.getElementById(id).style.display = "block";
        }

        function closeModal() {
            document.getElementById("modal-overlay").style.display = "none";
            currentSeat = null;
        }

        function openLoginModal() {
            document.getElementById("login-password").value = "";
            openModal("modal-login");
        }

        function submitLogin() {
            const pwd = document.getElementById("login-password").value;
            if (pwd === "Zyrina") {
                isAdminLoggedIn = true;
                document.getElementById("admin-login-area").style.display = "none";
                document.getElementById("admin-content-area").style.display = "block";
                closeModal();
                loadSeats();
            } else {
                alert("Password salah!");
            }
        }

        function logoutAdmin() {
            isAdminLoggedIn = false;
            document.getElementById("admin-login-area").style.display = "block";
            document.getElementById("admin-content-area").style.display = "none";
            adminList.innerHTML = "";
        }

        function promptBooking(seatId) {
            currentSeat = seatId;
            document.getElementById("booking-seat-id").innerText = seatId;
            document.getElementById("booking-absen").value = "";

            const selectEl = document.getElementById("booking-name");
            selectEl.innerHTML = '<option value="" disabled selected>Pilih Nama</option>';

            const usedNames = globalFilledSeats.map(s => s.name);
            studentData.forEach(student => {
                if (!usedNames.includes(student.name)) {
                    const opt = document.createElement("option");
                    opt.value = student.name;
                    opt.innerText = student.name;
                    selectEl.appendChild(opt);
                }
            });

            selectEl.onchange = function() {
                const sData = studentData.find(s => s.name === this.value);
                if (sData) {
                    document.getElementById("booking-absen").value = sData.absen;
                }
            };

            openModal("modal-booking");
        }

        async function submitBooking() {
            const name = document.getElementById("booking-name").value;
            const absenVal = document.getElementById("booking-absen").value;

            if (!name || !absenVal) {
                alert("Harap pilih Nama dan isi Nomor Absen!");
                return;
            }

            const absen = parseInt(absenVal, 10);
            if (absen < 1 || absen > 32) {
                alert("Nomor Absen harus antara 1 sampai 32!");
                return;
            }

            const usedAbsens = globalFilledSeats.map(s => parseInt(s.absen, 10));
            if (usedAbsens.includes(absen)) {
                alert("Nomor Absen " + absen + " sudah terdaftar di kursi lain!");
                return;
            }

            const { error: insertError } = await supabaseClient
                .from("Seats")
                .insert({ seat_id: currentSeat, name: name, absen: absen });

            if (insertError) {
                alert("Gagal simpan");
                console.error(insertError);
            } else {
                closeModal();
                loadSeats();
            }
        }

        function showDetail(seatId, name, absen) {
            document.getElementById("detail-seat-id").innerText = seatId;
            document.getElementById("detail-name").innerText = name;
            document.getElementById("detail-absen").innerText = absen;
            openModal("modal-detail");
        }

        function promptDelete(seatId, name) {
            currentSeat = seatId;
            document.getElementById("confirm-seat-id").innerText = seatId;
            document.getElementById("confirm-name").innerText = name;
            openModal("modal-confirm");
        }

        async function submitDelete() {
            const { error: delError } = await supabaseClient
                .from("Seats")
                .delete()
                .eq("seat_id", currentSeat);

            if (delError) {
                alert("Gagal menghapus");
                console.error(delError);
            } else {
                closeModal();
                loadSeats();
            }
        }

        async function loadSeats() {
            seatsDiv.innerHTML = "";
            if (isAdminLoggedIn) adminList.innerHTML = "";

            const { data, error } = await supabaseClient
                .from("Seats")
                .select("*");

            if (error) {
                alert("Error load data");
                console.error(error);
                return;
            }

            const filledSeats = data.filter(s => s.name);
            globalFilledSeats = filledSeats;

            if (isAdminLoggedIn) {
                if (filledSeats.length === 0) {
                    adminList.innerHTML = '<div style="font-size:12px; opacity:0.5;">Belum ada kursi terisi</div>';
                } else {
                    // Urutkan berdasarkan seat_id
                    filledSeats.sort((a, b) => a.seat_id.localeCompare(b.seat_id)).forEach(s => {
                        const item = document.createElement("div");
                        item.className = "admin-item";

                        const info = document.createElement("span");
                        info.innerText = s.seat_id + " - " + s.name;

                        const delBtn = document.createElement("button");
                        delBtn.className = "btn-delete";
                        delBtn.innerText = "Hapus";
                        delBtn.onclick = () => promptDelete(s.seat_id, s.name);

                        item.appendChild(info);
                        item.appendChild(delBtn);
                        adminList.appendChild(item);
                    });
                }
            }

            rows.forEach(row => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "desk-row";

                for (let deskIdx = 0; deskIdx < 4; deskIdx++) {
                    const deskDiv = document.createElement("div");
                    deskDiv.className = "desk";

                    for (let seatIdx = 1; seatIdx <= 2; seatIdx++) {
                        const col = deskIdx * 2 + seatIdx;
                        const seatId = row + col;
                        const seatData = data.find(x => x.seat_id === seatId);

                        const seatDiv = document.createElement("div");
                        seatDiv.className = "seat " + (seatData ? "filled" : "empty");

                        const nameDiv = document.createElement("div");
                        nameDiv.className = "seat-name";
                        nameDiv.innerText = seatData ? seatData.name : seatId;

                        const absenDiv = document.createElement("div");
                        absenDiv.className = "seat-absen";
                        absenDiv.innerText = seatData ? seatData.absen : "-";

                        seatDiv.appendChild(nameDiv);
                        seatDiv.appendChild(absenDiv);

                        seatDiv.onclick = () => {
                            if (seatData) {
                                showDetail(seatId, seatData.name, seatData.absen);
                            } else {
                                promptBooking(seatId);
                            }
                        };
                        deskDiv.appendChild(seatDiv);
                    }
                    rowDiv.appendChild(deskDiv);
                }
                seatsDiv.appendChild(rowDiv);
            });
        }

        loadSeats();
    </script>
</body>

</html>
