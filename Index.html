<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Tempat Duduk</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  margin: 0;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.screen {
  width: 80%;
  height: 40px;
  background: white;
  margin: 20px 0 40px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
  text-align: center;
  line-height: 40px;
  color: black;
  font-weight: bold;
}

.legend {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.legend div {
  display: flex;
  align-items: center;
  gap: 8px;
}

.box {
  width: 20px;
  height: 20px;
  border-radius: 5px;
}

.empty { background: #22c55e; }
.filled { background: #ef4444; }

.seats {
  display: grid;
  grid-template-columns: repeat(6, 60px);
  gap: 15px;
}

.seat {
  width: 60px;
  height: 60px;
  border-radius: 15px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  color: white;
}

.seat:hover {
  transform: scale(1.08);
}

.seat.empty-seat {
  background: #22c55e;
}

.seat.filled-seat {
  background: #ef4444;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  padding: 25px;
  border-radius: 20px;
  width: 300px;
}

.modal-content h2 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.buttons button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.save {
  background: #22c55e;
  color: white;
}

.cancel {
  background: #64748b;
  color: white;
}

.detail-box {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  width: 320px;
  display: none;
}

  </style>
</head>
<body>  <h1>🎬 Pilih Tempat Duduk</h1>
  <div class="screen">LAYAR</div>  <div class="legend">
    <div><div class="box empty"></div> Kosong</div>
    <div><div class="box filled"></div> Terisi</div>
  </div>  <div class="seats" id="seats"></div>  <div class="detail-box" id="detailBox"></div>  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="seatTitle">Isi Kursi</h2><input type="text" id="nameInput" placeholder="Nama" />
  <input type="number" id="absenInput" placeholder="Nomor Absen" />

  <div class="buttons">
    <button class="save" onclick="saveSeat()">Simpan</button>
    <button class="cancel" onclick="closeModal()">Batal</button>
  </div>
</div>

  </div>  <script>
    const seatsContainer = document.getElementById('seats');
    const modal = document.getElementById('modal');
    const detailBox = document.getElementById('detailBox');

    const rows = ['A', 'B', 'C', 'D'];
    const cols = 6;

    let selectedSeat = null;

    let seatData = JSON.parse(localStorage.getItem('seatData')) || {};

    function renderSeats() {
      seatsContainer.innerHTML = '';

      rows.forEach(row => {
        for (let i = 1; i <= cols; i++) {
          const seatId = row + i;
          const button = document.createElement('button');
          button.classList.add('seat');

          if (seatData[seatId]) {
            button.classList.add('filled-seat');
          } else {
            button.classList.add('empty-seat');
          }

          button.textContent = seatId;

          button.onclick = () => handleSeatClick(seatId);

          seatsContainer.appendChild(button);
        }
      });
    }

    function handleSeatClick(seatId) {
      if (seatData[seatId]) {
        const data = seatData[seatId];

        detailBox.style.display = 'block';
        detailBox.innerHTML = `
          <h3>📍 Detail Kursi ${seatId}</h3>
          <p><b>Nama:</b> ${data.name}</p>
          <p><b>Absen:</b> ${data.absen}</p>
        `;
      } else {
        selectedSeat = seatId;
        document.getElementById('seatTitle').textContent = `Isi Kursi ${seatId}`;
        document.getElementById('nameInput').value = '';
        document.getElementById('absenInput').value = '';
        modal.style.display = 'flex';
      }
    }

    function saveSeat() {
      const name = document.getElementById('nameInput').value.trim();
      const absen = document.getElementById('absenInput').value.trim();

      if (!name || !absen) {
        alert('Isi semua dulu 😭');
        return;
      }

      seatData[selectedSeat] = {
        name,
        absen
      };

      localStorage.setItem('seatData', JSON.stringify(seatData));

      closeModal();
      renderSeats();
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    renderSeats();
  </script></body>
</html>
