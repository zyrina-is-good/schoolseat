<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seat Booking</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(6,60px);
      gap:10px;
      justify-content:center;
      margin-top:40px;
    }

    .seat{
      width:60px;
      height:60px;
      border:none;
      border-radius:15px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .empty{
      background:#22c55e;
    }

    .filled{
      background:#ef4444;
    }
  </style>
</head>
<body>

<h1>🎬 Pilih Kursi</h1>

<div class="container" id="seats"></div>

<script>
  const supabaseUrl = 'https://basaafhivrfpkytcacsi.supabase.co'

  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc2FhZmhpdnJmcGt5dGNhY3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDQ0ODksImV4cCI6MjA5NTE4MDQ4OX0.-vvIoSse9Ztp_ljGb6BwVNxon1geLBCkHvBet5gq1tU'

  const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
  )

  const seatsDiv = document.getElementById('seats')

  const rows = ['A','B','C','D']
  const cols = 6

  async function loadSeats(){

    seatsDiv.innerHTML = ''

    const { data } = await supabase
      .from('seats')
      .select('*')

    rows.forEach(row=>{

      for(let i=1;i<=cols;i++){

        const seatId = row+i

        const seatData = data.find(x=>x.seat_id===seatId)

        const btn = document.createElement('button')

        btn.innerText = seatId

        btn.className =
          'seat ' + (seatData ? 'filled':'empty')

        btn.onclick = async ()=>{

          if(seatData){

            alert(
              'Nama: ' + seatData.name +
              '\nAbsen: ' + seatData.absen
            )

          } else {

            const name = prompt('Nama?')
            if(!name) return

            const absen = prompt('Nomor Absen?')
            if(!absen) return

            await supabase
              .from('seats')
              .insert({
                seat_id: seatId,
                name: name,
                absen: absen
              })

            loadSeats()
          }
        }

        seatsDiv.appendChild(btn)
      }

    })
  }

  loadSeats()
</script>

</body>
</html>
